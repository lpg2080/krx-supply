name: krx-supply

on:
  schedule:
    - cron: "23 10 * * 1-5"
    - cron: "31 10 * * 1-5"
    - cron: "35 22 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python fetch.py
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: update supply
          file_pattern: supply.csv
